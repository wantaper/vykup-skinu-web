            background-size: auto, 250px 250px, 200% 200%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column; /* Aby byl footer dole */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Skrýt horizontální scroll */
            position: relative;
        }

        /* Animace pozadí */
        @keyframes gradientShift {
            0% { background-position: center, center, 0% 50%; }
            50% { background-position: center, center, 100% 50%; }
            100% { background-position: center, center, 0% 50%; }
        }

        /* --- Glassmorphism Container --- */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: auto; /* Vycentrování obsahu */
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* --- Input Pole --- */
        input[type="text"] {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(110, 231, 183, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6ee7b7;
            box-shadow: 0 0 15px rgba(110, 231, 183, 0.2);
        }

        /* --- CTA Tlačítko --- */
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: linear-gradient(45deg, #6366f1, #3b82f6);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.6);
        }

        /* --- Footer s odkazy --- */
        .footer {
            margin-top: auto; /* Přichycení k dolní části */
            padding: 40px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .social-links {
            display: flex;
            gap: 30px;
        }

        .social-icon {
            display: block;
            width: 30px;
            height: 30px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .copyright {
            font-size: 0.8rem;
            color: #475569;
        }
        
        /* --- Responzivita --- */
        @media (max-width: 500px) {
            .container { padding: 30px; margin: 20px; border-radius: 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
