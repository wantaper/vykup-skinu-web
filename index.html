<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Výkup CS2 Skinů</title>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        .btn { background: #3b82f6; color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vykupuji CS2 Skiny</h1>
        <p>Pošli mi své Trade URL a já ti obratem nacením tvůj inventář.</p>
        
        <form action="mailto:tve-jmeno@email.cz" method="post" enctype="text/plain">
            <input type="text" name="TradeURL" placeholder="Vlož své Steam Trade URL zde" required>
            <button type="submit" class="btn">Odeslat k nacenění</button>
        </form>
    </div>
</body>
</html>
